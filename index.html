    /* CodeMirror theme tuned to the monochrome palette -- color only where it earns its keep (syntax) */
    .cm-s-py-dark.CodeMirror { background: var(--bg-1); color: var(--text-0); }
    .cm-s-py-dark .CodeMirror-gutters { background: var(--bg-1); border: none; }
    .cm-s-py-dark .CodeMirror-linenumber { color: var(--text-3); }
    .cm-s-py-dark .cm-keyword { color: var(--accent); font-weight: 600; }

    .cm-s-py-dark .cm-builtin { color: var(--amber); }
    .cm-s-py-dark .cm-string { color: var(--green); }
    .cm-s-py-dark .cm-number { color: var(--purple); }
    .cm-s-py-dark .cm-comment { color: var(--text-3); font-style: italic; }
    .cm-s-py-dark .cm-operator { color: var(--text-1); }
    .cm-s-py-dark .cm-property { color: var(--text-0); }
    .cm-s-py-dark .cm-meta { color: var(--amber); }
    .cm-s-py-dark .CodeMirror-activeline-background { background: color-mix(in srgb, var(--accent) 6%, transparent); }
    .cm-s-py-dark .CodeMirror-matchingbracket { color: var(--accent) !important; border-bottom: 1px solid var(--accent); }
